[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Register custom marks
markers =
    smoke: Smoke validation test cases
    regression: Core regression validation test cases
    performance: Performance and timing tests
    assets: Static asset loading tests

# Configure default options
addopts = --html=reports/report.html --self-contained-html --junitxml=reports/junit.xml -v
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
