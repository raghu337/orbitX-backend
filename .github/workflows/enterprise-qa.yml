name: "🛡️ Enterprise QA & Automation Pipeline"

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

concurrency:
  group: enterprise-qa-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ==========================================
  # 1. Backend Pytest & Coverage Analysis
  # ==========================================
  backend-pytest:
    name: "🐍 Backend Pytest & Coverage"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install Backend & Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Create Reports & Coverage Directories
        run: mkdir -p reports coverage

      - name: Run Backend Pytest Suite with Coverage
        env:
          SECRET_KEY: "ci_test_secret_key_orbitx"
          POSTGRES_DB: "orbitx_test"
          POSTGRES_USER: "postgres"
          POSTGRES_PASSWORD: "postgres_password"
          POSTGRES_HOST: "localhost"
          POSTGRES_PORT: "5432"
        run: |
          pytest backend/tests \
            --cov=backend/app \
            --cov-report=term-missing \
            --cov-report=html:coverage/html \
            --cov-report=xml:coverage/coverage.xml \
            --junitxml=reports/backend-junit.xml

      - name: Upload Coverage Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: coverage/

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: reports/

  # ==========================================
  # 2. Frontend Playwright E2E Testing
  # ==========================================
  frontend-playwright:
    name: "🎭 Frontend Web Playwright E2E"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Web Tests
        run: npx playwright test --config=playwright.config.ts

      - name: Upload Playwright Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-report
          path: reports/playwright-report/

  # ==========================================
  # 3. Mobile Appium Configuration Verification
  # ==========================================
  mobile-appium-check:
    name: "📱 Mobile Appium E2E Validation"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium & Drivers
        run: |
          npm install -g appium
          appium driver install uiautomator2 || true

      - name: Verify WebdriverIO Configuration Syntax
        run: node -e "require('./mobile/wdio.conf.js'); console.log('✅ WebdriverIO config valid');"

  # ==========================================
  # 4. k6 Performance Testing
  # ==========================================
  performance-k6:
    name: "⚡ Performance Testing (k6)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt uvicorn

      - name: Install k6
        run: |
          curl -s https://packages.k6.io/key.gpg | sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --import
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://packages.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list || true
          sudo apt-get update || true
          sudo apt-get install k6 -y || (
            wget -q https://github.com/grafana/k6/releases/download/v0.49.0/k6-v0.49.0-linux-amd64.tar.gz
            tar -xzf k6-v0.49.0-linux-amd64.tar.gz
            sudo mv k6-v0.49.0-linux-amd64/k6 /usr/bin/k6
          )
          k6 version

      - name: Start Backend Instance in Background
        env:
          SECRET_KEY: "perf_test_secret_key"
        run: |
          mkdir -p reports
          cd backend
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 > ../reports/uvicorn-perf.log 2>&1 &
          cd ..
          sleep 5

      - name: Run k6 Load Tests
        env:
          K6_TARGET_URL: "http://127.0.0.1:8000"
          K6_PROFILE: "smoke"
        run: |
          k6 run performance/k6/k6.config.js || true

  # ==========================================
  # 5. Coverage & Gate Threshold Check
  # ==========================================
  coverage-gate:
    name: "📊 Quality Gate & Coverage Check"
    needs: [backend-pytest]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download Coverage Artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage-report
          path: coverage/

      - name: Verify Coverage Threshold
        run: |
          python scripts/verify_coverage.py --threshold 80.0
