name: OrbitX DevSecOps Quality & Security Scanner

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ----------------------------------------------------
  # Job 1: Secrets Scanning
  # ----------------------------------------------------
  secret-scan:
    name: Secrets Detection (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks Scan
        run: |
          mkdir -p security-reports
          echo "[Gitleaks] Downloading and setting up scanner..."
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -zxvf gitleaks_8.18.2_linux_x64.tar.gz
          echo "[Gitleaks] Scanning repository history..."
          ./gitleaks detect --source=. --config=.gitleaks.toml --format=json --report-path=security-reports/gitleaks-report.json --redact --verbose || echo "[Gitleaks] Completed with findings."
          
          if [ ! -f security-reports/gitleaks-report.json ]; then
            echo "[]" > security-reports/gitleaks-report.json
          fi

      - name: Upload Gitleaks Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: security-reports/gitleaks-report.json

  # ----------------------------------------------------
  # Job 2: Static Application Security Testing (SAST)
  # ----------------------------------------------------
  sast-scan:
    name: Code Quality & SAST (Semgrep & CodeQL)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'

      - name: Install Semgrep
        run: |
          echo "[Semgrep] Installing SAST library..."
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Run Semgrep
        run: |
          mkdir -p security-reports
          echo "[Semgrep] Scanning source code..."
          semgrep scan --config auto --sarif --output security-reports/semgrep.sarif || echo "[Semgrep] Done."

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-python"
          output: codeql-results

      - name: Copy CodeQL SARIF Report
        if: always()
        run: |
          mkdir -p security-reports
          find ../results -name "*.sarif" -exec cp {} security-reports/codeql.sarif \; || echo "{}" > security-reports/codeql.sarif
          if [ ! -f security-reports/codeql.sarif ]; then
            echo "{}" > security-reports/codeql.sarif
          fi

      - name: Upload SAST Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-reports
          path: |
            security-reports/semgrep.sarif
            security-reports/codeql.sarif

  # ----------------------------------------------------
  # Job 3: Dependency & License Audits (Universal SCA)
  # ----------------------------------------------------
  dependency-scan:
    name: Software Composition Analysis (SCA)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Initialize Report Files
        run: |
          mkdir -p security-reports
          echo "[]" > security-reports/trivy-report.json
          echo "[]" > security-reports/trivy-license-report.json
          echo "# Python Dependency Audit - No python dependencies detected" > security-reports/pip-audit-report.md
          echo "# Node.js Dependency Audit - No node.js dependencies detected" > security-reports/npm-audit-report.md
          echo "# Go Dependency Audit - No Go dependencies detected" > security-reports/go-audit-report.md
          echo "# .NET Dependency Audit - No .NET dependencies detected" > security-reports/dotnet-audit-report.md
          echo "# Java Dependency Audit - No Java dependencies detected" > security-reports/java-audit-report.md

      - name: Detect Project Type
        id: detect
        run: |
          has_python="false"
          has_node="false"
          has_java="false"
          has_go="false"
          has_dotnet="false"
          has_poetry="false"
          has_pipenv="false"
          
          if find . -maxdepth 4 -name "requirements.txt" -o -name "setup.py" -o -name "pyproject.toml" -print -quit | grep -q .; then
            has_python="true"
          fi
          if find . -maxdepth 4 -name "poetry.lock" -print -quit | grep -q .; then
            has_poetry="true"
            has_python="true"
          fi
          if find . -maxdepth 4 -name "Pipfile" -print -quit | grep -q .; then
            has_pipenv="true"
            has_python="true"
          fi
          
          if find . -maxdepth 4 -name "package.json" -o -name "yarn.lock" -o -name "pnpm-lock.yaml" -print -quit | grep -q .; then
            has_node="true"
          fi

          if find . -maxdepth 4 -name "pom.xml" -o -name "build.gradle" -o -name "build.gradle.kts" -print -quit | grep -q .; then
            has_java="true"
          fi

          if find . -maxdepth 4 -name "go.mod" -o -name "go.sum" -print -quit | grep -q .; then
            has_go="true"
          fi

          if find . -maxdepth 4 -name "*.sln" -o -name "*.csproj" -o -name "*.fsproj" -o -name "*.vbproj" -print -quit | grep -q .; then
            has_dotnet="true"
          fi
          
          echo "has_python=$has_python" >> $GITHUB_OUTPUT
          echo "has_node=$has_node" >> $GITHUB_OUTPUT
          echo "has_java=$has_java" >> $GITHUB_OUTPUT
          echo "has_go=$has_go" >> $GITHUB_OUTPUT
          echo "has_dotnet=$has_dotnet" >> $GITHUB_OUTPUT
          echo "has_poetry=$has_poetry" >> $GITHUB_OUTPUT
          echo "has_pipenv=$has_pipenv" >> $GITHUB_OUTPUT

      - name: Set up Python
        if: steps.detect.outputs.has_python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'

      - name: Setup Node.js
        if: steps.detect.outputs.has_node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Setup Java JDK
        if: steps.detect.outputs.has_java == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Setup Go
        if: steps.detect.outputs.has_go == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: Setup .NET SDK
        if: steps.detect.outputs.has_dotnet == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          cache: true

      - name: Install Scanner Tools
        run: |
          retry_install() {
            local cmd="$1"
            echo "Executing: $cmd"
            if ! eval "$cmd"; then
              echo "[Warning] Command failed. Retrying once..."
              sleep 2
              if ! eval "$cmd"; then
                echo "[Error] Command failed on retry."
                return 1
              fi
            fi
            return 0
          }

          if [ "${{ steps.detect.outputs.has_python }}" = "true" ]; then
            echo "[Install] Upgrading pip..."
            retry_install "python -m pip install --upgrade pip" || true
            echo "[Install] Installing pip-audit..."
            retry_install "pip install pip-audit" || echo "[Warning] Failed to install pip-audit."
          fi

          if [ "${{ steps.detect.outputs.has_poetry }}" = "true" ]; then
            echo "[Install] Installing poetry..."
            retry_install "pip install poetry" || echo "[Warning] Failed to install poetry."
          fi

          if [ "${{ steps.detect.outputs.has_pipenv }}" = "true" ]; then
            echo "[Install] Installing pipenv..."
            retry_install "pip install pipenv" || echo "[Warning] Failed to install pipenv."
          fi

          if [ "${{ steps.detect.outputs.has_go }}" = "true" ]; then
            echo "[Install] Installing govulncheck..."
            retry_install "go install golang.org/x/vuln/cmd/govulncheck@latest" || echo "[Warning] Failed to install govulncheck."
          fi

          echo "[Install] Installing Trivy..."
          retry_install "curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin v0.51.1" || echo "[Warning] Failed to install Trivy."

      - name: Run Filesystem Vulnerability & License Scan (Trivy)
        continue-on-error: true
        run: |
          echo "[SCA] Initiating Trivy scan..."
          trivy fs . --format json --output security-reports/trivy-report.json || echo "[]" > security-reports/trivy-report.json
          trivy fs . --scanners license --license-full --format json --output security-reports/trivy-license-report.json || echo "[]" > security-reports/trivy-license-report.json

      - name: Run Python Dependency Audit
        if: steps.detect.outputs.has_python == 'true'
        continue-on-error: true
        run: |
          echo "[SCA] Initiating Python pip-audit..."
          echo "# Python Dependency Vulnerability Scan" > security-reports/pip-audit-report.md
          find . -maxdepth 3 -name "requirements.txt" | while read req; do
            echo "## Auditing $req" >> security-reports/pip-audit-report.md
            pip-audit -r "$req" -f markdown >> security-reports/pip-audit-report.md || true
          done

      - name: Run Poetry Dependency Audit
        if: steps.detect.outputs.has_poetry == 'true'
        continue-on-error: true
        run: |
          echo "[SCA] Initiating Poetry audit..."
          echo "## Poetry Dependency Scan" >> security-reports/pip-audit-report.md
          find . -maxdepth 3 -name "poetry.lock" | while read lock; do
            dir=$(dirname "$lock")
            echo "### Auditing Poetry in $dir" >> security-reports/pip-audit-report.md
            (cd "$dir" && pip-audit -f markdown) >> security-reports/pip-audit-report.md || true
          done

      - name: Run Pipenv Dependency Audit
        if: steps.detect.outputs.has_pipenv == 'true'
        continue-on-error: true
        run: |
          echo "[SCA] Initiating Pipenv audit..."
          echo "## Pipenv Dependency Scan" >> security-reports/pip-audit-report.md
          find . -maxdepth 3 -name "Pipfile" | while read pipfile; do
            dir=$(dirname "$pipfile")
            echo "### Auditing Pipenv in $dir" >> security-reports/pip-audit-report.md
            (cd "$dir" && pip-audit -f markdown) >> security-reports/pip-audit-report.md || true
          done

      - name: Run Node.js Dependency Audit
        if: steps.detect.outputs.has_node == 'true'
        continue-on-error: true
        run: |
          echo "[SCA] Initiating Node npm audit..."
          echo "# Node.js Dependency Audit" > security-reports/npm-audit-report.md
          find . -maxdepth 3 -name "package.json" | while read pkg; do
            if [[ "$pkg" == *"/node_modules/"* ]]; then
              continue
            fi
            dir=$(dirname "$pkg")
            echo "## Auditing Node packages in $dir" >> security-reports/npm-audit-report.md
            echo '```json' >> security-reports/npm-audit-report.md
            (cd "$dir" && npm audit || true) >> security-reports/npm-audit-report.md
            echo '```' >> security-reports/npm-audit-report.md
          done

      - name: Run Go Dependency Audit
        if: steps.detect.outputs.has_go == 'true'
        continue-on-error: true
        run: |
          echo "[SCA] Initiating Go govulncheck..."
          echo "# Go Dependency Audit" > security-reports/go-audit-report.md
          find . -maxdepth 3 -name "go.mod" | while read mod; do
            dir=$(dirname "$mod")
            echo "## Auditing Go module in $dir" >> security-reports/go-audit-report.md
            echo '```' >> security-reports/go-audit-report.md
            (cd "$dir" && govulncheck ./... || true) >> security-reports/go-audit-report.md
            echo '```' >> security-reports/go-audit-report.md
          done

      - name: Run .NET Dependency Audit
        if: steps.detect.outputs.has_dotnet == 'true'
        continue-on-error: true
        run: |
          echo "[SCA] Initiating .NET vulnerability checks..."
          echo "# .NET Dependency Audit" > security-reports/dotnet-audit-report.md
          find . -maxdepth 3 -name "*.csproj" | while read proj; do
            dir=$(dirname "$proj")
            echo "## Auditing .NET project in $dir" >> security-reports/dotnet-audit-report.md
            echo '```' >> security-reports/dotnet-audit-report.md
            (cd "$dir" && dotnet restore || true)
            (cd "$dir" && dotnet list package --vulnerable || true) >> security-reports/dotnet-audit-report.md
            echo '```' >> security-reports/dotnet-audit-report.md
          done

      - name: Run Java Dependency Audit
        if: steps.detect.outputs.has_java == 'true'
        continue-on-error: true
        run: |
          echo "# Java Dependency Audit" > security-reports/java-audit-report.md
          echo "Java dependency checks are aggregated in the Trivy Filesystem Scan reports." >> security-reports/java-audit-report.md

      - name: Upload SCA Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-reports
          path: |
            security-reports/trivy-report.json
            security-reports/trivy-license-report.json
            security-reports/pip-audit-report.md
            security-reports/npm-audit-report.md
            security-reports/go-audit-report.md
            security-reports/dotnet-audit-report.md
            security-reports/java-audit-report.md

  # ----------------------------------------------------
  # Job 4: Report Aggregation & Publishing
  # ----------------------------------------------------
  aggregate-reports:
    name: Aggregate & Publish Reports
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [ secret-scan, sast-scan, dependency-scan ]
    if: always()
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Work Directory
        run: mkdir -p security-reports

      - name: Download Gitleaks Report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: gitleaks-report
          path: security-reports

      - name: Download SAST Reports
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: sast-reports
          path: security-reports

      - name: Download SCA Reports
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: sca-reports
          path: security-reports

      - name: Generate Consolidated dependency-report.md
        run: |
          cat << 'EOF' > security-reports/dependency-report.md
          # OrbitX Dependencies Vulnerability & License Compliance Report
          
          This report aggregates scans from Trivy, pip-audit, npm audit, govulncheck, and dotnet list.
          
          ## Python Vulnerabilities
          See detailed audits below:
          EOF
          if [ -f security-reports/pip-audit-report.md ]; then
            cat security-reports/pip-audit-report.md >> security-reports/dependency-report.md
          fi
          
          echo -e "\n## Node.js Vulnerabilities\n" >> security-reports/dependency-report.md
          if [ -f security-reports/npm-audit-report.md ]; then
            cat security-reports/npm-audit-report.md >> security-reports/dependency-report.md
          fi

          echo -e "\n## Go Vulnerabilities\n" >> security-reports/dependency-report.md
          if [ -f security-reports/go-audit-report.md ]; then
            cat security-reports/go-audit-report.md >> security-reports/dependency-report.md
          fi

          echo -e "\n## .NET Vulnerabilities\n" >> security-reports/dependency-report.md
          if [ -f security-reports/dotnet-audit-report.md ]; then
            cat security-reports/dotnet-audit-report.md >> security-reports/dependency-report.md
          fi

          echo -e "\n## Java Vulnerabilities\n" >> security-reports/dependency-report.md
          if [ -f security-reports/java-audit-report.md ]; then
            cat security-reports/java-audit-report.md >> security-reports/dependency-report.md
          fi

      - name: Generate summary.md and Print Console Log
        run: |
          python -c '
          import os, json
          
          gitleaks_findings = 0
          trivy_vulns = 0
          semgrep_findings = 0
          
          # Read Gitleaks
          gl_path = "security-reports/gitleaks-report.json"
          if os.path.exists(gl_path):
              try:
                  with open(gl_path) as f:
                      gitleaks_findings = len(json.load(f))
              except: pass
              
          # Read Trivy
          tv_path = "security-reports/trivy-report.json"
          if os.path.exists(tv_path):
              try:
                  with open(tv_path) as f:
                      data = json.load(f)
                      for res in data.get("Results", []):
                          trivy_vulns += len(res.get("Vulnerabilities", []))
              except: pass
              
          # Read Semgrep
          sg_path = "security-reports/semgrep.sarif"
          if os.path.exists(sg_path):
              try:
                  with open(sg_path) as f:
                      sarif = json.load(f)
                      for run in sarif.get("runs", []):
                          semgrep_findings += len(run.get("results", []))
              except: pass
              
          summary_content = f"""# OrbitX Security & Quality Pipeline Execution Summary
          
          ## Pipeline Status: Complete
          
          | Scanner Tool | Scan Type | Findings Detected |
          |---|---|---|
          | **Gitleaks** | Secrets Scanning | {gitleaks_findings} |
          | **Semgrep** | SAST Code Quality | {semgrep_findings} |
          | **Trivy** | Dependency & Config | {trivy_vulns} |
          
          ### Action Items
          1. {"Address identified secret exposure leaks immediately." if gitleaks_findings > 0 else "No secrets leaks detected."}
          2. {"Upgrade out-of-date dependencies reported in dependency-report.md." if trivy_vulns > 0 else "All dependencies are clean."}
          3. {"Remediation needed for code quality flags in semgrep.sarif." if semgrep_findings > 0 else "Source code passes structural quality check."}
          """
          with open("security-reports/summary.md", "w") as f:
              f.write(summary_content)
          '
          cat security-reports/summary.md

      - name: Upload Final Security Reports Directory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orbitx-security-reports
          path: security-reports/
