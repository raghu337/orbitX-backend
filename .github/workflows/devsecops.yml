name: OrbitX DevSecOps Quality & Security Scanner

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ----------------------------------------------------
  # Job 1: Secrets Scanning
  # ----------------------------------------------------
  secret-scan:
    name: Secrets Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks Scan
        run: |
          mkdir -p security-reports
          # Install and run Gitleaks locally inside the runner
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -zxvf gitleaks_8.18.2_linux_x64.tar.gz
          ./gitleaks detect --source=. --config=.gitleaks.toml --format=json --report-path=security-reports/gitleaks-report.json --redact --verbose || true
          
          # Create empty JSON report if none is generated (no leaks found)
          if [ ! -f security-reports/gitleaks-report.json ]; then
            echo "[]" > security-reports/gitleaks-report.json
          fi

      - name: Upload Gitleaks Report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: security-reports/gitleaks-report.json

  # ----------------------------------------------------
  # Job 2: Static Application Security Testing (SAST)
  # ----------------------------------------------------
  sast-scan:
    name: Code Quality & SAST (Semgrep & CodeQL)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: |
          mkdir -p security-reports
          semgrep scan --config auto --sarif --output security-reports/semgrep.sarif || true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, python

      # Auto-build attempts to compile code where necessary
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-python"
          output: codeql-results

      - name: Copy CodeQL SARIF Report
        run: |
          mkdir -p security-reports
          # Locate and move CodeQL SARIF output
          find ../results -name "*.sarif" -exec cp {} security-reports/codeql.sarif \; || echo "{}" > security-reports/codeql.sarif
          if [ ! -f security-reports/codeql.sarif ]; then
            echo "{}" > security-reports/codeql.sarif
          fi

      - name: Upload SAST Reports
        uses: actions/upload-artifact@v4
        with:
          name: sast-reports
          path: |
            security-reports/semgrep.sarif
            security-reports/codeql.sarif

  # ----------------------------------------------------
  # Job 3: Dependency & License Audits
  # ----------------------------------------------------
  dependency-scan:
    name: Software Composition Analysis (SCA)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python & Node.js
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Scanner Tools
        run: |
          pip install pip-audit safety
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.51.1

      - name: Run Filesystem Vulnerability & License Scan (Trivy)
        run: |
          mkdir -p security-reports
          # Run Trivy vulnerability scan
          trivy fs . --format json --output security-reports/trivy-report.json || true
          
          # Run Trivy license compliance scan
          trivy fs . --scanners license --license-full --format json --output security-reports/trivy-license-report.json || true

      - name: Run Python Dependency Audit
        run: |
          mkdir -p security-reports
          echo "# Python Dependency Vulnerability Scan" > security-reports/pip-audit-report.md
          
          # Detect and scan root requirements
          if [ -f "requirements.txt" ]; then
            echo "## Root dependencies audit" >> security-reports/pip-audit-report.md
            pip-audit -r requirements.txt -f markdown >> security-reports/pip-audit-report.md || true
          fi
          
          # Detect and scan backend requirements
          if [ -f "backend/requirements.txt" ]; then
            echo "## Backend dependencies audit" >> security-reports/pip-audit-report.md
            pip-audit -r backend/requirements.txt -f markdown >> security-reports/pip-audit-report.md || true
          fi
          
          # Run Safety check
          if [ -f "backend/requirements.txt" ]; then
            echo "## Safety Check Analysis" >> security-reports/pip-audit-report.md
            safety check -r backend/requirements.txt --output bare >> security-reports/pip-audit-report.md || true
          fi

      - name: Run Node.js Dependency Audit
        run: |
          mkdir -p security-reports
          echo "# Node.js Dependency Audit" > security-reports/npm-audit-report.md
          
          # Scan root node packages if package.json exists
          if [ -f "package.json" ]; then
            echo "## Root package audit" >> security-reports/npm-audit-report.md
            npm audit --json > security-reports/root-npm-audit.json || true
            echo '```json' >> security-reports/npm-audit-report.md
            npm audit || true >> security-reports/npm-audit-report.md
            echo '```' >> security-reports/npm-audit-report.md
          fi
          
          # Scan orbitx-web packages if it exists
          if [ -f "orbitx-web/package.json" ]; then
            echo "## Web frontend package audit" >> security-reports/npm-audit-report.md
            cd orbitx-web && npm audit --json > ../security-reports/web-npm-audit.json || true
            echo '```json' >> ../security-reports/npm-audit-report.md
            npm audit || true >> ../security-reports/npm-audit-report.md
            echo '```' >> ../security-reports/npm-audit-report.md
            cd ..
          fi

      - name: Upload SCA Reports
        uses: actions/upload-artifact@v4
        with:
          name: sca-reports
          path: |
            security-reports/trivy-report.json
            security-reports/trivy-license-report.json
            security-reports/pip-audit-report.md
            security-reports/npm-audit-report.md

  # ----------------------------------------------------
  # Job 4: Report Aggregation & Publishing
  # ----------------------------------------------------
  aggregate-reports:
    name: Aggregate & Publish Reports
    runs-on: ubuntu-latest
    needs: [ secret-scan, sast-scan, dependency-scan ]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Work Directory
        run: mkdir -p security-reports

      - name: Download Gitleaks Report
        uses: actions/download-artifact@v4
        with:
          name: gitleaks-report
          path: security-reports

      - name: Download SAST Reports
        uses: actions/download-artifact@v4
        with:
          name: sast-reports
          path: security-reports

      - name: Download SCA Reports
        uses: actions/download-artifact@v4
        with:
          name: sca-reports
          path: security-reports

      - name: Generate Consolidated dependency-report.md
        run: |
          cat << 'EOF' > security-reports/dependency-report.md
          # OrbitX Dependencies Vulnerability & License Compliance Report
          
          This report aggregates scans from Trivy, pip-audit, and npm audit.
          
          ## Python Vulnerabilities
          See detailed audits below:
          EOF
          if [ -f security-reports/pip-audit-report.md ]; then
            cat security-reports/pip-audit-report.md >> security-reports/dependency-report.md
          else
            echo "No Python dependency scan output found." >> security-reports/dependency-report.md
          fi
          
          echo -e "\n## Node.js Vulnerabilities\n" >> security-reports/dependency-report.md
          if [ -f security-reports/npm-audit-report.md ]; then
            cat security-reports/npm-audit-report.md >> security-reports/dependency-report.md
          else
            echo "No Node.js dependency scan output found." >> security-reports/dependency-report.md
          fi

      - name: Generate summary.md and Print Console Log
        run: |
          # Parse findings to generate summary.md
          python -c '
          import os, json
          
          gitleaks_findings = 0
          trivy_vulns = 0
          semgrep_findings = 0
          
          # Read Gitleaks
          gl_path = "security-reports/gitleaks-report.json"
          if os.path.exists(gl_path):
              try:
                  with open(gl_path) as f:
                      gitleaks_findings = len(json.load(f))
              except: pass
              
          # Read Trivy
          tv_path = "security-reports/trivy-report.json"
          if os.path.exists(tv_path):
              try:
                  with open(tv_path) as f:
                      data = json.load(f)
                      for res in data.get("Results", []):
                          trivy_vulns += len(res.get("Vulnerabilities", []))
              except: pass
              
          # Read Semgrep
          sg_path = "security-reports/semgrep.sarif"
          if os.path.exists(sg_path):
              try:
                  with open(sg_path) as f:
                      sarif = json.load(f)
                      for run in sarif.get("runs", []):
                          semgrep_findings += len(run.get("results", []))
              except: pass
              
          summary_content = f"""# OrbitX Security & Quality Pipeline Execution Summary
          
          ## Pipeline Status: Complete
          
          | Scanner Tool | Scan Type | Findings Detected |
          |---|---|---|
          | **Gitleaks** | Secrets Scanning | {gitleaks_findings} |
          | **Semgrep** | SAST Code Quality | {semgrep_findings} |
          | **Trivy** | Dependency & Config | {trivy_vulns} |
          
          ### Action Items
          1. {"Address identified secret exposure leaks immediately." if gitleaks_findings > 0 else "No secrets leaks detected."}
          2. {"Upgrade out-of-date dependencies reported in dependency-report.md." if trivy_vulns > 0 else "All dependencies are clean."}
          3. {"Remediation needed for code quality flags in semgrep.sarif." if semgrep_findings > 0 else "Source code passes structural quality check."}
          """
          with open("security-reports/summary.md", "w") as f:
              f.write(summary_content)
          '
          cat security-reports/summary.md

      - name: Upload Final Security Reports Directory
        uses: actions/upload-artifact@v4
        with:
          name: orbitx-security-reports
          path: security-reports/
