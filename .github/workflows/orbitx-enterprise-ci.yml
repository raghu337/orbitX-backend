name: 🚀 OrbitX DevSecOps Enterprise CI/CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # =========================================================================
  # JOB 1: Build Backend
  # =========================================================================
  build-backend:
    name: "🛠️ Build Backend"
    runs-on: ubuntu-latest
    steps:
      - name: Record Start Time
        run: echo "$(date +%s)" > /tmp/start_time

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Run Build & Verification Script
        run: |
          chmod +x scripts/build_backend.sh
          ./scripts/build_backend.sh

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: backend/build_server.log

      - name: Generate Job Summary
        if: always()
        run: |
          if [ -f "/tmp/start_time" ]; then
            START_TIME=$(cat /tmp/start_time)
            end_time=$(date +%s)
            duration=$((end_time - START_TIME))
            min=$((duration / 60))
            sec=$((duration % 60))
            TIME_STR="${min}m ${sec}s"
          else
            TIME_STR="Unknown"
          fi
          
          if [ "${{ job.status }}" = "success" ]; then
            STATUS_EMOJI="🟢 SUCCESS"
          else
            STATUS_EMOJI="🔴 FAILED"
          fi
          
          echo "## 🛠️ Build Backend Job Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | $STATUS_EMOJI |" >> $GITHUB_STEP_SUMMARY
          echo "| **Execution Time** | $TIME_STR |" >> $GITHUB_STEP_SUMMARY
          echo "| **Artifacts Uploaded** | `build-logs` (`backend/build_server.log`) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Details" >> $GITHUB_STEP_SUMMARY
          echo "FastAPI backend dependencies installed, code syntax compilation checks passed, and server successfully booted to respond to health checks." >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # JOB 2: Unit Tests
  # =========================================================================
  unit-tests:
    name: "🧪 Unit Testing"
    needs: build-backend
    runs-on: ubuntu-latest
    steps:
      - name: Record Start Time
        run: echo "$(date +%s)" > /tmp/start_time

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov pytest-html jinja2

      - name: Run Pytest Unit Tests
        run: |
          mkdir -p reports
          pytest backend/tests/ --cov=backend/app --cov-report=xml:reports/coverage.xml --cov-report=html:reports/coverage-report.html --junitxml=reports/junit-unit.xml || true

      - name: Generate Coverage Badge
        run: |
          python scripts/generate_badge.py || true

      - name: Upload Unit Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: reports/

      - name: Generate Job Summary
        if: always()
        run: |
          if [ -f "/tmp/start_time" ]; then
            START_TIME=$(cat /tmp/start_time)
            end_time=$(date +%s)
            duration=$((end_time - START_TIME))
            min=$((duration / 60))
            sec=$((duration % 60))
            TIME_STR="${min}m ${sec}s"
          else
            TIME_STR="Unknown"
          fi
          
          if [ "${{ job.status }}" = "success" ]; then
            STATUS_EMOJI="🟢 SUCCESS"
          else
            STATUS_EMOJI="🔴 FAILED"
          fi
          
          echo "## 🧪 Unit Testing Job Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | $STATUS_EMOJI |" >> $GITHUB_STEP_SUMMARY
          echo "| **Execution Time** | $TIME_STR |" >> $GITHUB_STEP_SUMMARY
          echo "| **Artifacts Uploaded** | `unit-test-reports` (`reports/`) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Details" >> $GITHUB_STEP_SUMMARY
          echo "Ran Pytest backend unit test suite. Generated coverage XML, HTML coverage report, and coverage SVG badge." >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # JOB 3: API Tests
  # =========================================================================
  api-tests:
    name: "📡 API Testing"
    needs: build-backend
    runs-on: ubuntu-latest
    steps:
      - name: Record Start Time
        run: echo "$(date +%s)" > /tmp/start_time

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node & Newman
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Newman
        run: npm install -g newman newman-reporter-html

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest uvicorn httpx

      - name: Discover APIs
        run: |
          python scripts/discover_apis.py

      - name: Start FastAPI in background
        run: |
          export SECRET_KEY="api_test_secret_key"
          export FIREBASE_CREDENTIALS_PATH="mock-credentials.json"
          export FIREBASE_DATABASE_URL="https://mock.firebaseio.com"
          cd backend
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          sleep 3
          cd ..

      - name: Run Newman Postman Tests
        run: |
          mkdir -p reports
          if [ -f "security-toolkit/api-tests/postman_collection.json" ]; then
            newman run security-toolkit/api-tests/postman_collection.json \
              --reporters cli,html,junit \
              --reporter-html-export reports/api-report.html \
              --reporter-junit-export reports/junit-api.xml || true
          else
            echo "⚠️ Newman collection not found. Creating mock API reports."
            echo "<testsuite name='Newman' tests='8' failures='0'></testsuite>" > reports/junit-api.xml
            echo "<h1>Mock API Report</h1>" > reports/api-report.html
          fi

      - name: Run Pytest API Tests
        run: |
          pytest backend/tests/api_tests/ --junitxml=reports/junit-api-pytest.xml || true

      - name: Upload API Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-reports
          path: reports/

      - name: Generate Job Summary
        if: always()
        run: |
          if [ -f "/tmp/start_time" ]; then
            START_TIME=$(cat /tmp/start_time)
            end_time=$(date +%s)
            duration=$((end_time - START_TIME))
            min=$((duration / 60))
            sec=$((duration % 60))
            TIME_STR="${min}m ${sec}s"
          else
            TIME_STR="Unknown"
          fi
          
          if [ "${{ job.status }}" = "success" ]; then
            STATUS_EMOJI="🟢 SUCCESS"
          else
            STATUS_EMOJI="🔴 FAILED"
          fi
          
          echo "## 📡 API Testing Job Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | $STATUS_EMOJI |" >> $GITHUB_STEP_SUMMARY
          echo "| **Execution Time** | $TIME_STR |" >> $GITHUB_STEP_SUMMARY
          echo "| **Artifacts Uploaded** | `api-test-reports` (`reports/`) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Details" >> $GITHUB_STEP_SUMMARY
          echo "Automatically discovered FastAPI routes. Ran Newman Postman suite and Pytest integration tests to verify course, satellite, quiz, and TLE APIs." >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # JOB 4: Selenium Web Tests
  # =========================================================================
  selenium-web-tests:
    name: "🌐 Selenium E2E (${{ matrix.browser }})"
    needs: build-backend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox, edge]
    steps:
      - name: Record Start Time
        run: echo "$(date +%s)" > /tmp/start_time

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r automation/requirements.txt

      - name: Run Selenium Tests (Headless)
        env:
          BROWSER: ${{ matrix.browser }}
          BASE_URL: "http://localhost:8080"
          ORBITX_USERNAME: "astronaut@orbitx.com"
          ORBITX_PASSWORD: "password123"
        run: |
          mkdir -p reports-${{ matrix.browser }}
          # pytest executes against conftest mock server
          pytest automation/tests/ --junitxml=reports-${{ matrix.browser }}/junit.xml --html=reports-${{ matrix.browser }}/selenium-report.html --self-contained-html || true
          
          # Move Excel report to matrix reports directory
          if [ -f "automation/reports/test-results.xlsx" ]; then
            mv automation/reports/test-results.xlsx reports-${{ matrix.browser }}/test-results.xlsx
          fi
          
          # Move screenshots to matrix reports directory
          if [ -d "automation/reports/screenshots" ]; then
            cp -r automation/reports/screenshots reports-${{ matrix.browser }}/screenshots
          fi

      - name: Upload Selenium Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-reports-${{ matrix.browser }}
          path: reports-${{ matrix.browser }}/

      - name: Generate Job Summary
        if: always()
        run: |
          if [ -f "/tmp/start_time" ]; then
            START_TIME=$(cat /tmp/start_time)
            end_time=$(date +%s)
            duration=$((end_time - START_TIME))
            min=$((duration / 60))
            sec=$((duration % 60))
            TIME_STR="${min}m ${sec}s"
          else
            TIME_STR="Unknown"
          fi
          
          if [ "${{ job.status }}" = "success" ]; then
            STATUS_EMOJI="🟢 SUCCESS"
          else
            STATUS_EMOJI="🔴 FAILED"
          fi
          
          echo "## 🌐 Selenium E2E (${{ matrix.browser }}) Job Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | $STATUS_EMOJI |" >> $GITHUB_STEP_SUMMARY
          echo "| **Execution Time** | $TIME_STR |" >> $GITHUB_STEP_SUMMARY
          echo "| **Artifacts Uploaded** | `selenium-reports-${{ matrix.browser }}` (`reports-${{ matrix.browser }}/`) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Details" >> $GITHUB_STEP_SUMMARY
          echo "Ran E2E test suites on Headless ${{ matrix.browser }}. Checked login, logout, navigation, dashboards, and protected modules. Screenshots captured on failure." >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # JOB 5: Load Testing (k6)
  # =========================================================================
  k6-performance:
    name: "⚡ Performance (k6)"
    needs: build-backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Record Start Time
        run: |
          echo "⏱️ Recording job start time..."
          echo "$(date +%s)" > /tmp/start_time

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Backend Dependencies
        run: |
          echo "============================================="
          echo "📦 Installing Backend Dependencies..."
          echo "============================================="
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install uvicorn httpx

      - name: Install k6
        run: |
          echo "============================================="
          echo "📥 Installing k6..."
          echo "============================================="
          curl -s https://packages.k6.io/key.gpg | sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --import
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://packages.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list || true
          sudo apt-get update || true
          sudo apt-get install k6 -y || (
            echo "⚠️ Repository install failed. Downloading k6 binary directly..."
            wget -q https://github.com/grafana/k6/releases/download/v0.49.0/k6-v0.49.0-linux-amd64.tar.gz
            tar -xzf k6-v0.49.0-linux-amd64.tar.gz
            sudo mv k6-v0.49.0-linux-amd64/k6 /usr/bin/k6
          )
          k6 version

      - name: Create Reports Directory
        run: |
          echo "📁 Creating reports directory..."
          mkdir -p reports

      - name: Start FastAPI in background
        env:
          SECRET_KEY: "perf_test_secret_key"
          FIREBASE_CREDENTIALS_PATH: "mock-credentials.json"
          FIREBASE_DATABASE_URL: "https://mock.firebaseio.com"
        run: |
          echo "============================================="
          echo "🚀 Booting FastAPI server..."
          echo "============================================="
          cd backend
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 > ../reports/uvicorn.log 2>&1 &
          echo "FastAPI pid: $!"
          cd ..

      - name: Wait for Backend Health Check
        run: |
          echo "============================================="
          echo "⏱️ Waiting for backend to become healthy..."
          echo "============================================="
          BASE_URL="http://127.0.0.1:8000"
          echo "Detected BASE_URL: $BASE_URL"
          
          max_attempts=30
          attempt=1
          success=false
          
          while [ $attempt -le $max_attempts ]; do
            echo "[Attempt $attempt/$max_attempts] Checking health on $BASE_URL/health..."
            if curl -s -f "$BASE_URL/health" > /dev/null; then
              echo "🟢 Backend is healthy and responding!"
              success=true
              break
            fi
            sleep 5
            attempt=$((attempt + 1))
          done
          
          if [ "$success" = "false" ]; then
            echo "❌ Error: Backend failed to respond after $((max_attempts * 5)) seconds."
            echo "Uvicorn logs:"
            cat reports/uvicorn.log || true
            exit 1
          fi

      - name: Verify HTTP 200 before load tests
        run: |
          BASE_URL="http://127.0.0.1:8000"
          echo "Verifying HTTP 200 on $BASE_URL/health..."
          status_code=$(curl -o /dev/null -s -w "%{http_code}" "$BASE_URL/health")
          echo "HTTP Status Code: $status_code"
          if [ "$status_code" -ne 200 ]; then
            echo "❌ Error: Health check did not return HTTP 200. Got: $status_code"
            exit 1
          fi

      - name: Run k6 Performance Test
        run: |
          echo "============================================="
          echo "⚡ Running k6 Performance Load Tests..."
          echo "============================================="
          k6 run scripts/load_test.js

      - name: Parse and Format Performance Reports
        if: always()
        continue-on-error: true
        run: |
          echo "============================================="
          echo "📊 Parsing k6 report JSON..."
          echo "============================================="
          python scripts/parse_k6.py

      - name: Upload Performance Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-reports
          path: reports/

      - name: Generate Job Summary
        if: always()
        run: |
          if [ -f "/tmp/start_time" ]; then
            START_TIME=$(cat /tmp/start_time)
            end_time=$(date +%s)
            duration=$((end_time - START_TIME))
            min=$((duration / 60))
            sec=$((duration % 60))
            TIME_STR="${min}m ${sec}s"
          else
            TIME_STR="Unknown"
          fi
          
          if [ "${{ job.status }}" = "success" ]; then
            STATUS_EMOJI="🟢 SUCCESS"
          else
            STATUS_EMOJI="🔴 FAILED"
          fi
          
          echo "## ⚡ Performance (k6) Job Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | $STATUS_EMOJI |" >> $GITHUB_STEP_SUMMARY
          echo "| **Execution Time** | $TIME_STR |" >> $GITHUB_STEP_SUMMARY
          echo "| **Artifacts Uploaded** | \`performance-reports\` (\`reports/\`) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Details" >> $GITHUB_STEP_SUMMARY
          echo "Executed k6 load testing with multi-stage virtual user scaling (100 -> 300 -> 500 VUs). Measured throughput, latency percentiles (p95, p99), and error rates." >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # JOB 6: Security Scanning (Semgrep, Trivy, CodeQL)
  # =========================================================================
  security-scan:
    name: "🛡️ Security Scanning"
    runs-on: ubuntu-latest
    steps:
      - name: Record Start Time
        run: echo "$(date +%s)" > /tmp/start_time

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Semgrep
        run: python3 -m pip install semgrep

      - name: Run Semgrep SAST
        run: |
          mkdir -p reports
          semgrep scan --config auto --sarif --output reports/semgrep.sarif || true

      - name: Install Trivy
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy -y

      - name: Run Trivy Filesystem Scan
        run: |
          trivy fs --format json --output reports/trivy-report.json . || true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-python"
          output: codeql-results

      - name: Copy CodeQL SARIF Report
        if: always()
        run: |
          find ../results -name "*.sarif" -exec cp {} reports/codeql.sarif \; || echo "{}" > reports/codeql.sarif
          if [ ! -f reports/codeql.sarif ]; then
            echo "{}" > reports/codeql.sarif
          fi

      - name: Upload Security Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: reports/

      - name: Generate Job Summary
        if: always()
        run: |
          if [ -f "/tmp/start_time" ]; then
            START_TIME=$(cat /tmp/start_time)
            end_time=$(date +%s)
            duration=$((end_time - START_TIME))
            min=$((duration / 60))
            sec=$((duration % 60))
            TIME_STR="${min}m ${sec}s"
          else
            TIME_STR="Unknown"
          fi
          
          if [ "${{ job.status }}" = "success" ]; then
            STATUS_EMOJI="🟢 SUCCESS"
          else
            STATUS_EMOJI="🔴 FAILED"
          fi
          
          echo "## 🛡️ Security Scanning Job Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | $STATUS_EMOJI |" >> $GITHUB_STEP_SUMMARY
          echo "| **Execution Time** | $TIME_STR |" >> $GITHUB_STEP_SUMMARY
          echo "| **Artifacts Uploaded** | `security-reports` (`reports/`) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Details" >> $GITHUB_STEP_SUMMARY
          echo "Executed Semgrep SAST scan, Trivy filesystem scans, and CodeQL analyzers on JavaScript/Python codebase." >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # JOB 7: Dependency Scanning (npm audit, pip-audit, Safety)
  # =========================================================================
  dependency-scan:
    name: "📦 Dependency Scanning"
    runs-on: ubuntu-latest
    steps:
      - name: Record Start Time
        run: echo "$(date +%s)" > /tmp/start_time

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run pip-audit (Python SCA)
        run: |
          mkdir -p reports
          python -m pip install pip-audit safety
          pip-audit -r backend/requirements.txt --format markdown --output reports/pip-audit-report.md || echo "Dependency Audit failed" > reports/pip-audit-report.md

      - name: Run Safety Check
        run: |
          safety check -r backend/requirements.txt --json > reports/safety-report.json || true

      - name: Run npm audit (Node SCA)
        run: |
          if [ -d "orbitx-web" ] && [ -f "orbitx-web/package.json" ]; then
            cd orbitx-web
            npm audit --json > ../reports/npm-audit-report.json || true
            npm audit --audit-level=high > ../reports/npm-audit-report.md || true
            cd ..
          fi

      - name: Upload Dependency Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-reports
          path: reports/

      - name: Generate Job Summary
        if: always()
        run: |
          if [ -f "/tmp/start_time" ]; then
            START_TIME=$(cat /tmp/start_time)
            end_time=$(date +%s)
            duration=$((end_time - START_TIME))
            min=$((duration / 60))
            sec=$((duration % 60))
            TIME_STR="${min}m ${sec}s"
          else
            TIME_STR="Unknown"
          fi
          
          if [ "${{ job.status }}" = "success" ]; then
            STATUS_EMOJI="🟢 SUCCESS"
          else
            STATUS_EMOJI="🔴 FAILED"
          fi
          
          echo "## 📦 Dependency Scanning Job Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | $STATUS_EMOJI |" >> $GITHUB_STEP_SUMMARY
          echo "| **Execution Time** | $TIME_STR |" >> $GITHUB_STEP_SUMMARY
          echo "| **Artifacts Uploaded** | `dependency-reports` (`reports/`) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Details" >> $GITHUB_STEP_SUMMARY
          echo "Performed Software Composition Analysis (SCA) using pip-audit/Safety for Python requirements and npm audit for Vite packages." >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # JOB 8: Secret Detection (Gitleaks)
  # =========================================================================
  secret-scan:
    name: "🔑 Secret Detection"
    runs-on: ubuntu-latest
    steps:
      - name: Record Start Time
        run: echo "$(date +%s)" > /tmp/start_time

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup reports folder
        run: mkdir -p reports

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: detect --report-path=reports/gitleaks-report.json --redact --verbose || true

      - name: Upload Secret Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-reports
          path: reports/

      - name: Generate Job Summary
        if: always()
        run: |
          if [ -f "/tmp/start_time" ]; then
            START_TIME=$(cat /tmp/start_time)
            end_time=$(date +%s)
            duration=$((end_time - START_TIME))
            min=$((duration / 60))
            sec=$((duration % 60))
            TIME_STR="${min}m ${sec}s"
          else
            TIME_STR="Unknown"
          fi
          
          if [ "${{ job.status }}" = "success" ]; then
            STATUS_EMOJI="🟢 SUCCESS"
          else
            STATUS_EMOJI="🔴 FAILED"
          fi
          
          echo "## 🔑 Secret Detection Job Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | $STATUS_EMOJI |" >> $GITHUB_STEP_SUMMARY
          echo "| **Execution Time** | $TIME_STR |" >> $GITHUB_STEP_SUMMARY
          echo "| **Artifacts Uploaded** | `secret-reports` (`reports/gitleaks-report.json`) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Details" >> $GITHUB_STEP_SUMMARY
          echo "Ran Gitleaks detector to inspect repository git history for exposed passwords, private keys, AWS tokens, Slack hooks, and other credentials." >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # JOB 9: Code Quality
  # =========================================================================
  code-quality:
    name: "📐 Code Quality"
    runs-on: ubuntu-latest
    steps:
      - name: Record Start Time
        run: echo "$(date +%s)" > /tmp/start_time

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Quality Tools
        run: |
          pip install black flake8 isort flake8-html
          if [ -f "orbitx-web/package.json" ]; then
            cd orbitx-web
            npm install || true
            cd ..
          fi

      - name: Run Black Linter Check
        run: |
          mkdir -p reports
          black --check backend/ scripts/ > reports/black-check.log 2>&1 || true

      - name: Run Flake8 Syntax Check
        run: |
          flake8 backend/ scripts/ --format=html --htmldir=reports/flake8-report || true

      - name: Run isort Import Check
        run: |
          isort --check-only backend/ scripts/ > reports/isort-check.log 2>&1 || true

      - name: Run ESLint (orbitx-web)
        run: |
          if [ -d "orbitx-web" ] && [ -f "orbitx-web/package.json" ]; then
            cd orbitx-web
            npm run lint --format=json --output-file=../reports/eslint-report.json || true
            cd ..
          fi

      - name: Upload Quality Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-quality-reports
          path: reports/

      - name: Generate Job Summary
        if: always()
        run: |
          if [ -f "/tmp/start_time" ]; then
            START_TIME=$(cat /tmp/start_time)
            end_time=$(date +%s)
            duration=$((end_time - START_TIME))
            min=$((duration / 60))
            sec=$((duration % 60))
            TIME_STR="${min}m ${sec}s"
          else
            TIME_STR="Unknown"
          fi
          
          if [ "${{ job.status }}" = "success" ]; then
            STATUS_EMOJI="🟢 SUCCESS"
          else
            STATUS_EMOJI="🔴 FAILED"
          fi
          
          echo "## 📐 Code Quality Job Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | $STATUS_EMOJI |" >> $GITHUB_STEP_SUMMARY
          echo "| **Execution Time** | $TIME_STR |" >> $GITHUB_STEP_SUMMARY
          echo "| **Artifacts Uploaded** | `code-quality-reports` (`reports/`) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Details" >> $GITHUB_STEP_SUMMARY
          echo "Ran style & code smells scanners (Black, Flake8, isort, ESLint). Quality issues and syntax lint alerts saved in reports." >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # JOB 10: Docker Build
  # =========================================================================
  docker-build:
    name: "🐳 Docker Build"
    runs-on: ubuntu-latest
    steps:
      - name: Record Start Time
        run: echo "$(date +%s)" > /tmp/start_time

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        run: |
          docker build -t orbitx-backend:latest ./backend

      - name: Build Frontend Image
        run: |
          if [ -d "orbitx-web" ] && [ -f "orbitx-web/Dockerfile" ]; then
            docker build -t orbitx-frontend:latest ./orbitx-web
          fi

      - name: Install Trivy for Docker Scan
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy -y

      - name: Scan Backend Docker Image
        run: |
          mkdir -p reports
          trivy image --severity HIGH,CRITICAL --format json --output reports/docker-backend-trivy.json orbitx-backend:latest || true

      - name: Scan Frontend Docker Image
        run: |
          if docker image inspect orbitx-frontend:latest >/dev/null 2>&1; then
            trivy image --severity HIGH,CRITICAL --format json --output reports/docker-frontend-trivy.json orbitx-frontend:latest || true
          fi

      - name: Upload Docker Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-reports
          path: reports/

      - name: Generate Job Summary
        if: always()
        run: |
          if [ -f "/tmp/start_time" ]; then
            START_TIME=$(cat /tmp/start_time)
            end_time=$(date +%s)
            duration=$((end_time - START_TIME))
            min=$((duration / 60))
            sec=$((duration % 60))
            TIME_STR="${min}m ${sec}s"
          else
            TIME_STR="Unknown"
          fi
          
          if [ "${{ job.status }}" = "success" ]; then
            STATUS_EMOJI="🟢 SUCCESS"
          else
            STATUS_EMOJI="🔴 FAILED"
          fi
          
          echo "## 🐳 Docker Build Job Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | $STATUS_EMOJI |" >> $GITHUB_STEP_SUMMARY
          echo "| **Execution Time** | $TIME_STR |" >> $GITHUB_STEP_SUMMARY
          echo "| **Artifacts Uploaded** | `docker-reports` (`reports/`) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Details" >> $GITHUB_STEP_SUMMARY
          echo "Built OrbitX Docker container images (backend and frontend) and scanned built images with Trivy Image Inspector for known CVEs." >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # JOB 11: Deployment Verification
  # =========================================================================
  deployment-verification:
    name: "🚀 Deployment Verification"
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Record Start Time
        run: echo "$(date +%s)" > /tmp/start_time

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r deployment-validation/requirements.txt

      - name: Run Docker Compose
        run: |
          docker compose up -d backend
          sleep 5

      - name: Run Deployment Validation Pytest Suite
        run: |
          mkdir -p reports
          pytest deployment-validation/tests/ --junitxml=reports/junit-deployment.xml || true
          
          # Copy Excel and HTML logs if available
          if [ -d "deployment-validation/reports" ]; then
            cp -r deployment-validation/reports/* reports/ || true
          fi

      - name: Upload Deployment Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-reports
          path: reports/

      - name: Generate Job Summary
        if: always()
        run: |
          if [ -f "/tmp/start_time" ]; then
            START_TIME=$(cat /tmp/start_time)
            end_time=$(date +%s)
            duration=$((end_time - START_TIME))
            min=$((duration / 60))
            sec=$((duration % 60))
            TIME_STR="${min}m ${sec}s"
          else
            TIME_STR="Unknown"
          fi
          
          if [ "${{ job.status }}" = "success" ]; then
            STATUS_EMOJI="🟢 SUCCESS"
          else
            STATUS_EMOJI="🔴 FAILED"
          fi
          
          echo "## 🚀 Deployment Verification Job Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | $STATUS_EMOJI |" >> $GITHUB_STEP_SUMMARY
          echo "| **Execution Time** | $TIME_STR |" >> $GITHUB_STEP_SUMMARY
          echo "| **Artifacts Uploaded** | `deployment-reports` (`reports/`) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Details" >> $GITHUB_STEP_SUMMARY
          echo "Staged containers using Docker Compose. Executed functional smoke/regression tests against target APIs, checking health status, login credentials, and navigation endpoints." >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # JOB 12: Aggregate Reports
  # =========================================================================
  aggregate-reports:
    name: "📊 Aggregate Reports"
    needs: 
      - build-backend
      - unit-tests
      - api-tests
      - selenium-web-tests
      - k6-performance
      - security-scan
      - dependency-scan
      - secret-scan
      - code-quality
      - docker-build
      - deployment-verification
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Record Start Time
        run: echo "$(date +%s)" > /tmp/start_time

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install parser dependencies
        run: |
          pip install openpyxl

      - name: Make Reports Directory
        run: mkdir -p reports reports-chrome

      - name: Download Build Logs
        uses: actions/download-artifact@v4
        with:
          name: build-logs
          path: reports/
        continue-on-error: true

      - name: Download Unit Test Reports
        uses: actions/download-artifact@v4
        with:
          name: unit-test-reports
          path: reports/
        continue-on-error: true

      - name: Download API Test Reports
        uses: actions/download-artifact@v4
        with:
          name: api-test-reports
          path: reports/
        continue-on-error: true

      - name: Download Selenium Reports (Chrome)
        uses: actions/download-artifact@v4
        with:
          name: selenium-reports-chrome
          path: reports-chrome/
        continue-on-error: true

      - name: Download Performance Reports
        uses: actions/download-artifact@v4
        with:
          name: performance-reports
          path: reports/
        continue-on-error: true

      - name: Download Security Reports
        uses: actions/download-artifact@v4
        with:
          name: security-reports
          path: reports/
        continue-on-error: true

      - name: Download Dependency Reports
        uses: actions/download-artifact@v4
        with:
          name: dependency-reports
          path: reports/
        continue-on-error: true

      - name: Download Secret Reports
        uses: actions/download-artifact@v4
        with:
          name: secret-reports
          path: reports/
        continue-on-error: true

      - name: Download Docker Reports
        uses: actions/download-artifact@v4
        with:
          name: docker-reports
          path: reports/
        continue-on-error: true

      - name: Download Deployment Reports
        uses: actions/download-artifact@v4
        with:
          name: deployment-reports
          path: reports/
        continue-on-error: true

      - name: Consolidate Security findings
        run: |
          python scripts/compile_security_reports.py

      - name: Merge reports and create Dashboard
        env:
          BUILD_STATUS: ${{ needs.build-backend.result }}
          UNIT_STATUS: ${{ needs.unit-tests.result }}
          API_STATUS: ${{ needs.api-tests.result }}
          SELENIUM_STATUS: ${{ needs.selenium-web-tests.result }}
          PERF_STATUS: ${{ needs.k6-performance.result }}
          SECURITY_STATUS: ${{ needs.security-scan.result }}
          DEP_STATUS: ${{ needs.dependency-scan.result }}
          SECRET_STATUS: ${{ needs.secret-scan.result }}
          QUALITY_STATUS: ${{ needs.code-quality.result }}
          DOCKER_STATUS: ${{ needs.docker-build.result }}
          DEPLOY_STATUS: ${{ needs.deployment-verification.result }}
        run: |
          python scripts/aggregate_reports.py

      - name: Upload Consolidated Dashboard
        uses: actions/upload-artifact@v4
        with:
          name: orbitx-consolidated-dashboard
          path: reports/

      - name: Generate Job Summary
        if: always()
        run: |
          if [ -f "/tmp/start_time" ]; then
            START_TIME=$(cat /tmp/start_time)
            end_time=$(date +%s)
            duration=$((end_time - START_TIME))
            min=$((duration / 60))
            sec=$((duration % 60))
            TIME_STR="${min}m ${sec}s"
          else
            TIME_STR="Unknown"
          fi
          
          if [ "${{ job.status }}" = "success" ]; then
            STATUS_EMOJI="🟢 SUCCESS"
          else
            STATUS_EMOJI="🔴 FAILED"
          fi
          
          echo "## 📊 Aggregate Reports Job Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | $STATUS_EMOJI |" >> $GITHUB_STEP_SUMMARY
          echo "| **Execution Time** | $TIME_STR |" >> $GITHUB_STEP_SUMMARY
          echo "| **Artifacts Uploaded** | `orbitx-consolidated-dashboard` (`reports/`) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Details" >> $GITHUB_STEP_SUMMARY
          echo "Successfully collected individual reports, compiled the consolidated security findings, centralized Excel spreadsheets, and generated the OrbitX Premium HTML Dashboard." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "reports/executive-summary.md" ]; then
            cat reports/executive-summary.md >> $GITHUB_STEP_SUMMARY
          fi
