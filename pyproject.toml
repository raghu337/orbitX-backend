[tool.black]
line-length = 100
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
(
  /(
      \.eggs
    | \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
  )/
)
'''

[tool.isort]
profile = "black"
line_length = 100
multi_line_output = 3

[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra -q --tb=short"
pythonpath = ["backend"]
testpaths = [
    "backend/tests",
    "automation/tests",
    "deployment-validation/tests"
]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
markers = [
    "ui: UI automation tests",
    "auth: Authentication tests",
    "smoke: Smoke deployment checks",
    "api: API endpoint tests"
]
