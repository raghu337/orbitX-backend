[pytest]
minversion = 7.0
pythonpath = backend .
testpaths = backend/tests frontend/tests mobile/tests automation/tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = -ra -v --tb=short
markers =
    ui: UI and E2E automation test cases
    auth: Authentication and JWT authorization tests
    unit: Backend unit tests
    integration: API and DB integration tests
    mobile: Mobile app Appium test cases
    smoke: Deployment smoke verification tests
    performance: Performance threshold benchmark tests
    e2e: End to end functional test cases

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

