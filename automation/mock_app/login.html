<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OrbitX - Login Portal</title>
    <style>
        body {
            background-color: #02050c;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background-color: #050914;
            border: 1px solid #00e5ff33;
            padding: 40px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.15);
        }
        h2 {
            margin-top: 0;
            color: #ffffff;
            text-align: center;
            letter-spacing: 2px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00e5ff;
        }
        input {
            width: 100%;
            padding: 10px;
            background-color: #0c1424;
            border: 1px solid #00e5ff33;
            border-radius: 6px;
            color: #ffffff;
            box-sizing: border-box;
            outline: none;
        }
        input:focus {
            border-color: #00e5ff;
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.3);
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00e5ff, #3b82f6);
            border: none;
            border-radius: 6px;
            color: #ffffff;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        button:hover {
            opacity: 0.9;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }
        .error-msg {
            color: #ff3860;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        #general-error {
            background-color: rgba(255, 56, 96, 0.1);
            border: 1px solid #ff3860;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            color: #ff3860;
            text-align: center;
            font-size: 13px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 id="app-logo">ORBIT<span style="color:#00e5ff">X</span></h2>
        <div id="general-error">Invalid email or password.</div>
        
        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Username / Email</label>
                <input type="text" id="username" placeholder="commander@orbitx.com">
                <div id="username-error" class="error-msg">Username is required.</div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••">
                <div id="password-error" class="error-msg">Password is required.</div>
            </div>
            
            <button type="submit" id="login-btn">Log In</button>
        </form>
    </div>

    <script>
        // Check session persistence
        if (localStorage.getItem("sessionToken")) {
            window.location.href = "dashboard.html";
        }

        function handleLogin(event) {
            event.preventDefault();
            
            const usernameInput = document.getElementById("username");
            const passwordInput = document.getElementById("password");
            const usernameVal = usernameInput.value.trim();
            const passwordVal = passwordInput.value.trim();

            const usernameErr = document.getElementById("username-error");
            const passwordErr = document.getElementById("password-error");
            const generalErr = document.getElementById("general-error");

            // Reset errors
            usernameErr.style.display = "none";
            passwordErr.style.display = "none";
            generalErr.style.display = "none";

            let valid = true;

            // Form validation
            if (!usernameVal) {
                usernameErr.style.display = "block";
                valid = false;
            }
            if (!passwordVal) {
                passwordErr.style.display = "block";
                valid = false;
            }

            if (!valid) return;

            // Authentication verification
            if (usernameVal === "astronaut@orbitx.com" && passwordVal === "password123") {
                localStorage.setItem("sessionToken", "mock-access-token");
                localStorage.setItem("userName", "Reddy RaghuVardhan");
                window.location.href = "dashboard.html";
            } else {
                generalErr.style.display = "block";
            }
        }
    </script>
</body>
</html>
